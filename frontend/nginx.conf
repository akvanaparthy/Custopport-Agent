server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # API -> backend (single origin: the browser only ever talks to this server)
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # Server-Sent Events: stream immediately, allow long-lived connections
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
    }

    # SPA client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }
}
