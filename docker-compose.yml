# One command: `docker compose up --build`. Only the frontend is published
# (single origin); it proxies /api to the backend over the internal network.
# Requires ANTHROPIC_API_KEY in the environment (or a root .env file).
services:
  backend:
    build: ./backend
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:?set ANTHROPIC_API_KEY (export it or put it in ./.env)}
      DB_PATH: /data/app.db
    volumes:
      - app-data:/data
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/health').status==200 else 1)
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "${WEB_PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  app-data:
